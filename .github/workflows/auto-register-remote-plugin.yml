name: Auto-Register Remote Plugin

on:
  repository_dispatch:
    types: [plugin_release]

permissions:
  contents: write

jobs:
  register:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Resolve release asset URL
        id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.event.client_payload.repo }}
          TAG: ${{ github.event.client_payload.tag }}
        run: |
          echo "Repo: $REPO  Tag: $TAG"
          ASSET_URL=$(gh api "repos/$REPO/releases/tags/$TAG" \
            --jq '.assets[] | select(.name | endswith(".zip")) | .browser_download_url' \
            | head -1)
          if [ -z "$ASSET_URL" ]; then
            echo "Error: No .zip asset found for $REPO @ $TAG" >&2
            exit 1
          fi
          echo "asset_url=$ASSET_URL" >> "$GITHUB_OUTPUT"
          echo "Resolved: $ASSET_URL"

      - name: Register or update plugin in registry
        run: |
          python scripts/register_remote_plugin.py "${{ steps.resolve.outputs.asset_url }}"

      - name: Install test dependencies
        run: pip install pytest

      - name: Validate and test modified registry
        run: |
          python scripts/validate_json.py
          pytest tests/test_registry.py -v

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add REGISTRY/plugins.json
          if ! git diff --cached --quiet; then
            REPO="${{ github.event.client_payload.repo }}"
            TAG="${{ github.event.client_payload.tag }}"
            PLUGIN_NAME=$(basename "$REPO")
            git commit -m "Update registry: $PLUGIN_NAME $TAG"
            git push origin main
          else
            echo "No registry changes to commit."
          fi
