name: Plugin Tests

on:
  workflow_dispatch: 
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Detect whether anything outside REGISTRY/ changed. A registry-only push
  # (e.g. the metadata-sync commit after a version bump) cannot affect GUI or
  # API test outcomes, so those jobs are skipped for it. The `test` job always
  # runs — it owns the registry-integrity + sync checks that a registry change
  # most needs. workflow_dispatch has no diff base, so `code` defaults to true.
  # ---------------------------------------------------------------------------
  changes:
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - '!REGISTRY/**'

  # ---------------------------------------------------------------------------
  # Registry integrity — JSON validity, sha256/version consistency with the
  # plugin sources, and the metadata-sync no-op check. ALWAYS runs (this is the
  # job a registry-only change most needs). Registry data and the scripts that
  # produce it are interpreter-independent, so this runs on a single Python.
  # ---------------------------------------------------------------------------
  test-registry:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pytest pytest-mock numpy

      - name: Validate plugins.json
        run: python scripts/validate_json.py

      - name: Run registry integrity tests
        run: pytest tests/test_registry.py -v --tb=short

      # The registry scripts are not imported by any test, so a script that
      # fails to even import on a supported interpreter would otherwise ship
      # unnoticed. Running the updater also asserts the registry is in sync
      # with the plugin sources — it must be a no-op on a clean checkout.
      - name: Check registry is in sync with plugin sources
        run: |
          python scripts/update_intra_repo_metadata.py
          if ! git diff --exit-code REGISTRY/plugins.json; then
            echo "::error::REGISTRY/plugins.json is stale. Run 'python scripts/update_intra_repo_metadata.py' and commit the result."
            exit 1
          fi

  # ---------------------------------------------------------------------------
  # Plugin logic + smoke tests — everything in tests/ except registry integrity.
  # Skipped on a registry-only change (a metadata edit can't affect them).
  # No main app required.
  # ---------------------------------------------------------------------------
  test-plugins:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install pytest pytest-mock numpy

      - name: Run plugin tests
        run: pytest tests/ --ignore=tests/test_registry.py -v --tb=short

  # ---------------------------------------------------------------------------
  # Headless GUI tests — real PyQt6 with QT_QPA_PLATFORM=offscreen.
  # Chemistry libs (rdkit, numpy, …) are still mocked, so no conda env needed.
  # The integration tests auto-clone the main app if ../python_molecular_editor
  # is absent (one shallow clone per CI run, cached by session fixture).
  # ---------------------------------------------------------------------------
  test-gui:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Qt system libraries
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            libegl1 \
            libgl1 \
            libgles2 \
            libxkbcommon-x11-0 \
            libdbus-1-3

      - name: Install Python dependencies
        run: pip install pytest PyQt6

      # Real chemistry libs let the rdkit-gated GUI tests actually run on CI
      # instead of being importorskip-skipped (they hold real logic, not just
      # rendering). Best-effort: on an interpreter without wheels (e.g. a very
      # new 3.x), the install no-ops and those tests fall back to skipping, as
      # before. VTK/pyvista are deliberately NOT installed — their offscreen
      # render paths are abort-prone on headless CI.
      - name: Install real chemistry libs (best effort)
        run: pip install rdkit numpy pillow || echo "chemistry wheels unavailable on this interpreter; rdkit-gated tests will skip"

      - name: Run headless GUI tests
        run: pytest tests_gui/ -v --tb=short
        env:
          QT_QPA_PLATFORM: offscreen

  # ---------------------------------------------------------------------------
  # API compatibility check — requires the main app.
  # Clones python_molecular_editor at --depth 1 so test_api.py is not skipped.
  # ---------------------------------------------------------------------------
  test-api:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pytest

      - name: Clone main MoleditPy application
        run: |
          git clone --depth 1 \
            https://github.com/HiroYokoyama/python_molecular_editor.git \
            ../python_molecular_editor

      - name: Validate plugins.json
        run: python scripts/validate_json.py

      - name: Run API compatibility check
        run: pytest tests/test_api.py -v --tb=short
